<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Redes - COOSAJO</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --azul: #172e59; --verde: #158e45; --blanco: #ffffff; --fondo: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--fondo); margin: 0; padding: 20px; color: #333; }
        
        .header { display: flex; flex-direction: column; align-items: center; margin-bottom: 20px; position: relative; }
        .logo { max-width: 180px; margin-bottom: 10px; }
        .btn-volver { position: absolute; left: 0; top: 10px; background: var(--azul); color: white; padding: 10px 15px; text-decoration: none; border-radius: 8px; font-weight: bold; }
        
        .barra-herramientas { background: var(--blanco); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); margin-bottom: 25px; display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; }
        .filtro-item { display: flex; align-items: center; gap: 10px; font-size: 1.1rem; font-weight: bold; color: var(--azul); }
        select { padding: 10px; border-radius: 8px; border: 1px solid #ccc; font-size: 1.1rem; min-width: 120px; font-weight: bold; }
        
        /* Colores para los selectores */
        #anio1 { border: 2px solid var(--azul); color: var(--azul); }
        #anio2 { border: 2px solid var(--verde); color: var(--verde); }

        .grid-graficas { display: grid; grid-template-columns: 1fr; gap: 20px; max-width: 1200px; margin: 0 auto; }
        @media (min-width: 900px) { .grid-graficas { grid-template-columns: 1fr 1fr; } }
        
        .card { background: var(--blanco); padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #eaeaea; }
        .card.full-width { grid-column: 1 / -1; }
        h3 { text-align: center; color: var(--azul); margin-top: 0; font-size: 1.3rem; }
        .grafica-contenedor { height: 350px; width: 100%; position: relative; }
    </style>
</head>
<body>

    <div class="header">
        <a href="ingreso-redes.html" class="btn-volver">← Ingresar Datos</a>
        <img src="logo.png" alt="COOSAJO" class="logo" onerror="this.style.display='none'">
        <h1 style="color: var(--azul);">Comparativa de Redes Sociales</h1>
        <p style="margin: 0; color: #666;">Selecciona dos años para enfrentar las métricas históricas y actuales</p>
    </div>

    <div class="barra-herramientas">
        <div class="filtro-item">
            <label>🔵 Año A:</label>
            <select id="anio1">
                <option value="2023">2023</option>
                <option value="2024">2024</option>
                <option value="2025" selected>2025</option>
                <option value="2026">2026</option>
                <option value="2027">2027</option>
                <option value="2028">2028</option>
            </select>
        </div>
        <div class="filtro-item" style="font-size: 1.5rem; color: #999;">VS</div>
        <div class="filtro-item">
            <label>🟢 Año B:</label>
            <select id="anio2">
                <option value="2023">2023</option>
                <option value="2024">2024</option>
                <option value="2025">2025</option>
                <option value="2026" selected>2026</option>
                <option value="2027">2027</option>
                <option value="2028">2028</option>
            </select>
        </div>
    </div>

    <div class="grid-graficas">
        <div class="card full-width">
            <h3>Crecimiento de Seguidores</h3>
            <div class="grafica-contenedor"><canvas id="chartSeguidores"></canvas></div>
        </div>
        
        <div class="card">
            <h3>Visualizaciones Totales</h3>
            <div class="grafica-contenedor"><canvas id="chartVisualizaciones"></canvas></div>
        </div>

        <div class="card">
            <h3>Visitas al Perfil / Página</h3>
            <div class="grafica-contenedor"><canvas id="chartVisitas"></canvas></div>
        </div>

        <div class="card">
            <h3>Cantidad de Publicaciones</h3>
            <div class="grafica-contenedor"><canvas id="chartPublicaciones"></canvas></div>
        </div>

        <div class="card">
            <h3>Engagement Rate (%)</h3>
            <div class="grafica-contenedor"><canvas id="chartEngagement"></canvas></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyACfn6C6_XqLDQI29f6uHUUwlCQkSCXNYk",
            authDomain: "costos-comunicacion-digital.firebaseapp.com",
            projectId: "costos-comunicacion-digital",
            storageBucket: "costos-comunicacion-digital.firebasestorage.app",
            messagingSenderId: "299496606379",
            appId: "1:299496606379:web:a4d6609ff79eebff0c85ee"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // =======================================================
        // DATOS HISTÓRICOS EXTRAÍDOS DE TU EXCEL 
        // (Convertidos a números limpios para las gráficas)
        // =======================================================
        const datosHistoricos = [
            { anio: "2023", mes: "Enero", seguidores: 33571, visualizaciones: 488500, visitas: 8119, publicaciones: 111, engagement: 0.67 },
            { anio: "2023", mes: "Febrero", seguidores: 33833, visualizaciones: 767190, visitas: 7775, publicaciones: 107, engagement: 0.75 },
            { anio: "2023", mes: "Marzo", seguidores: 36416, visualizaciones: 1330000, visitas: 53321, publicaciones: 230, engagement: 0.87 },
            
            { anio: "2024", mes: "Enero", seguidores: 41155, visualizaciones: 1230000, visitas: 31641, publicaciones: 186, engagement: 0.44 },
            { anio: "2024", mes: "Febrero", seguidores: 41411, visualizaciones: 1160000, visitas: 38511, publicaciones: 202, engagement: 0.53 },
            { anio: "2024", mes: "Marzo", seguidores: 42058, visualizaciones: 1330000, visitas: 53330, publicaciones: 230, engagement: 0.87 },
            
            { anio: "2025", mes: "Enero", seguidores: 37777, visualizaciones: 671390, visitas: 28822, publicaciones: 132, engagement: 0.48 },
            { anio: "2025", mes: "Febrero", seguidores: 37890, visualizaciones: 896359, visitas: 60111, publicaciones: 127, engagement: 0.46 },
            { anio: "2025", mes: "Marzo", seguidores: 47325, visualizaciones: 2870000, visitas: 98790, publicaciones: 200, engagement: 0.78 },
            
            { anio: "2026", mes: "Enero", seguidores: 54956, visualizaciones: 3110000, visitas: 41690, publicaciones: 136, engagement: 0.91 },
            { anio: "2026", mes: "Febrero", seguidores: 55781, visualizaciones: 2180000, visitas: 38666, publicaciones: 145, engagement: 0.72 },
            { anio: "2026", mes: "Marzo", seguidores: 56350, visualizaciones: 1730000, visitas: 47685, publicaciones: 159, engagement: 0.62 }
        ];

        let datosFirebase = [];
        let graficas = {}; 
        const mesesEjeX = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];

        // Escuchar nuevos datos de Firebase y fusionarlos con el Excel
        onSnapshot(collection(db, "metricas_redes"), (snap) => {
            datosFirebase = snap.docs.map(d => d.data());
            actualizarGraficas();
        });

        document.getElementById('anio1').addEventListener('change', actualizarGraficas);
        document.getElementById('anio2').addEventListener('change', actualizarGraficas);

        function obtenerDatosPorAnioYMetrica(anio, metrica, dataTotal) {
            let datosDelAnio = dataTotal.filter(d => d.anio === anio);
            return mesesEjeX.map(mes => {
                let registro = datosDelAnio.find(d => d.mes === mes);
                // Si existe el registro lo devuelve, si no, devuelve null (deja el hueco en la gráfica)
                return registro ? registro[metrica] : null; 
            });
        }

        function dibujarGrafica(idCanvas, titulo, metrica, dataTotal, a1, a2) {
            const ctx = document.getElementById(idCanvas).getContext('2d');
            
            if (graficas[idCanvas]) graficas[idCanvas].destroy();

            const datosA1 = obtenerDatosPorAnioYMetrica(a1, metrica, dataTotal);
            const datosA2 = obtenerDatosPorAnioYMetrica(a2, metrica, dataTotal);

            graficas[idCanvas] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: mesesEjeX,
                    datasets: [
                        {
                            label: `Año ${a1}`,
                            data: datosA1,
                            borderColor: '#172e59', // Azul 
                            backgroundColor: 'rgba(23, 46, 89, 0.1)',
                            borderWidth: 3,
                            pointRadius: 5,
                            tension: 0.3,
                            fill: true,
                            spanGaps: false // Esto evita que trace líneas inventadas si falta un mes
                        },
                        {
                            label: `Año ${a2}`,
                            data: datosA2,
                            borderColor: '#158e45', // Verde
                            backgroundColor: 'rgba(21, 142, 69, 0.1)',
                            borderWidth: 3,
                            pointRadius: 5,
                            tension: 0.3,
                            fill: true,
                            spanGaps: false
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top', labels: { font: { size: 14, weight: 'bold' } } } },
                    scales: {
                        y: { beginAtZero: false },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        function actualizarGraficas() {
            const a1 = document.getElementById('anio1').value;
            const a2 = document.getElementById('anio2').value;
            
            // Fusión de tu Excel estático con los datos vivos de Firebase
            const dataTotal = [...datosHistoricos, ...datosFirebase];

            dibujarGrafica('chartSeguidores', 'Seguidores', 'seguidores', dataTotal, a1, a2);
            dibujarGrafica('chartVisualizaciones', 'Visualizaciones', 'visualizaciones', dataTotal, a1, a2);
            dibujarGrafica('chartVisitas', 'Visitas a la Página', 'visitas', dataTotal, a1, a2);
            dibujarGrafica('chartPublicaciones', 'Publicaciones', 'publicaciones', dataTotal, a1, a2);
            dibujarGrafica('chartEngagement', 'Engagement', 'engagement', dataTotal, a1, a2);
        }
    </script>
</body>
</html>
